<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aiden's Top Song Today</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 480px;
      width: 100%;
    }

    h1 {
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 2.5rem;
    }

    .album-art {
      width: 220px;
      height: 220px;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      margin: 0 auto 1.5rem;
      display: block;
      object-fit: cover;
    }

    .play-count {
      font-size: 0.75rem;
      color: #1DB954;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .song-title {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 0.4rem;
    }

    .artist {
      font-size: 1rem;
      color: #aaa;
    }

    .message {
      color: #888;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>Aiden's Top Song Today</h1>
  <div id="content"></div>
</div>

<script>
  async function main() {
    const el = document.getElementById('content');
    try {
      const res = await fetch('./data.json');
      if (!res.ok) throw new Error('Not found');
      const data = await res.json();

      if (!data.name) {
        el.innerHTML = '<p class="message">No plays yet today.</p>';
        return;
      }

      el.innerHTML = `
        <img class="album-art" src="${data.album_art}" alt="Album art">
        <div class="play-count">${data.play_count} play${data.play_count !== 1 ? 's' : ''} today</div>
        <div class="song-title">${data.name}</div>
        <div class="artist">${data.artist}</div>
      `;
    } catch {
      el.innerHTML = '<p class="message">No data yet — check back soon.</p>';
    }
  }

  main();
</script>
</body>
</html>
